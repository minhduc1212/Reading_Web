<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PANELS — Comic Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:     #F0EBE1;
    --ink:    #111010;
    --paper:  #FAFAF7;
    --red:    #E8281C;
    --muted:  #9E9890;
    --border: #D5CFC4;
    --gap: 24px;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ─────────────────────────────────────────────── */
  header {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 var(--gap);
    height: 56px;
    background: var(--bg);
    border-bottom: 1.5px solid var(--ink);
  }

  .logo {
    font-size: 22px; font-weight: 800; letter-spacing: -.5px;
    text-decoration: none; color: var(--ink);
    display: flex; align-items: center; gap: 8px;
  }
  .logo span {
    display: inline-block; width: 10px; height: 10px;
    background: var(--red); border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { transform: scale(1); opacity:1; }
    50%      { transform: scale(1.4); opacity:.7; }
  }

  .header-meta {
    font-family: 'Syne Mono', monospace;
    font-size: 11px; color: var(--muted); letter-spacing: .08em;
  }

  /* ── HERO BAR ────────────────────────────────────────────── */
  .hero {
    padding: 64px var(--gap) 48px;
    display: flex; align-items: flex-end; gap: 20px;
    border-bottom: 1.5px solid var(--border);
  }
  .hero-title {
    font-size: clamp(60px, 10vw, 120px);
    font-weight: 800; line-height: .9;
    letter-spacing: -4px;
  }
  .hero-title em {
    color: var(--red); font-style: normal;
  }
  .hero-sub {
    font-family: 'Syne Mono', monospace;
    font-size: 12px; color: var(--muted);
    letter-spacing: .1em; text-transform: uppercase;
    padding-bottom: 12px; border-left: 2px solid var(--border);
    padding-left: 16px; margin-left: auto;
    max-width: 180px; line-height: 1.7;
  }

  /* ── FILTER BAR ──────────────────────────────────────────── */
  .filter-bar {
    display: flex; align-items: center; gap: 6px;
    padding: 16px var(--gap);
    border-bottom: 1.5px solid var(--border);
  }
  .chip {
    border: 1.5px solid var(--ink);
    background: transparent;
    font-family: 'Syne Mono', monospace;
    font-size: 11px; letter-spacing: .08em;
    padding: 5px 14px; border-radius: 100px;
    cursor: pointer; transition: all .15s;
    color: var(--ink);
  }
  .chip:hover, .chip.active {
    background: var(--ink); color: var(--bg);
  }
  .chip.active { border-color: var(--ink); }

  #count {
    margin-left: auto;
    font-family: 'Syne Mono', monospace;
    font-size: 11px; color: var(--muted);
  }

  /* ── GRID ────────────────────────────────────────────────── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1.5px;
    background: var(--border);
    border-top: 1.5px solid var(--border);
  }

  .card {
    background: var(--paper);
    cursor: pointer;
    display: flex; flex-direction: column;
    text-decoration: none; color: inherit;
    transition: background .15s;
    overflow: hidden;
    position: relative;
  }
  .card:hover { background: var(--ink); }

  .card-img {
    width: 100%; aspect-ratio: 2/3; overflow: hidden;
    position: relative; background: var(--border);
  }
  .card-img img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform .4s cubic-bezier(.25,.46,.45,.94);
    display: block;
  }
  .card:hover .card-img img { transform: scale(1.04); }

  .card-img .no-cover {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 60px; opacity: .15;
  }

  .card-badge {
    position: absolute; top: 10px; right: 10px;
    font-family: 'Syne Mono', monospace;
    font-size: 10px; letter-spacing: .1em;
    padding: 3px 8px;
    background: var(--red); color: #fff;
    border-radius: 3px; text-transform: uppercase;
  }

  .card-body {
    padding: 14px 16px 16px;
    border-top: 1.5px solid var(--border);
    display: flex; flex-direction: column; gap: 6px;
    flex: 1;
  }
  .card:hover .card-body { border-color: #333; }

  .card-title {
    font-size: 14px; font-weight: 700;
    line-height: 1.3; letter-spacing: -.2px;
    transition: color .15s;
  }
  .card:hover .card-title { color: var(--bg); }

  .card-meta {
    font-family: 'Syne Mono', monospace;
    font-size: 10px; color: var(--muted);
    letter-spacing: .06em; text-transform: uppercase;
    margin-top: auto;
  }
  .card:hover .card-meta { color: #888; }

  /* ── EMPTY STATE ─────────────────────────────────────────── */
  .empty {
    grid-column: 1/-1;
    padding: 120px var(--gap);
    text-align: center;
    background: var(--paper);
  }
  .empty h2 { font-size: 28px; font-weight: 800; margin-bottom: 10px; }
  .empty p  { font-family: 'Syne Mono', monospace; font-size: 12px; color: var(--muted); line-height: 1.8; }
  .empty code { background: var(--border); padding: 2px 6px; border-radius: 3px; }

  /* ── LOADING ─────────────────────────────────────────────── */
  .loading {
    grid-column: 1/-1; padding: 80px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    font-family: 'Syne Mono', monospace; font-size: 12px; color: var(--muted);
    background: var(--paper);
  }
  .dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--ink);
    animation: blink 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100%{opacity:.15} 40%{opacity:1} }

  /* ── SKELETON ────────────────────────────────────────────── */
  .skeleton { animation: shimmer 1.5s infinite; }
  @keyframes shimmer {
    0%   { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }
  .sk-card { background: var(--paper); }
  .sk-img {
    width: 100%; aspect-ratio: 2/3;
    background: linear-gradient(90deg,var(--border) 25%,var(--bg) 50%,var(--border) 75%);
    background-size: 800px;
  }
  .sk-body { padding: 14px 16px; }
  .sk-line {
    height: 12px; border-radius: 2px; margin-bottom: 8px;
    background: linear-gradient(90deg,var(--border) 25%,var(--bg) 50%,var(--border) 75%);
    background-size: 800px;
  }
  .sk-line.short { width: 60%; }
</style>
</head>
<body>

<header>
  <a class="logo" href="/"><span></span>PANELS</a>
  <span class="header-meta" id="header-dir">LOADING LIBRARY…</span>
</header>

<div class="hero">
  <h1 class="hero-title">YOUR<br>LIB<em>R</em>ARY</h1>
  <p class="hero-sub">Browse and read your local comic collection — one-shots & series</p>
</div>

<div class="filter-bar">
  <button class="chip active" data-filter="all">All</button>
  <button class="chip" data-filter="oneshot">One-shots</button>
  <button class="chip" data-filter="series">Series</button>
  <span id="count"></span>
</div>

<div class="grid" id="grid">
  <div class="loading sk-card">
    <div class="sk-img skeleton"></div>
    <div class="sk-body">
      <div class="sk-line skeleton"></div>
      <div class="sk-line short skeleton"></div>
    </div>
  </div>
</div>

<script>
let allComics = [];
let currentFilter = 'all';

async function loadLibrary() {
  const res = await fetch('/api/library');
  allComics = await res.json();
  document.getElementById('header-dir').textContent =
    `${allComics.length} TITLE${allComics.length !== 1 ? 'S' : ''} IN LIBRARY`;
  render();
}

function render() {
  const grid = document.getElementById('grid');
  const filtered = currentFilter === 'all'
    ? allComics
    : allComics.filter(c => c.type === currentFilter);

  document.getElementById('count').textContent =
    `${filtered.length} / ${allComics.length}`;

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty">
      <h2>Nothing here yet.</h2>
      <p>Drop your comics into the folder:<br>
         <code>comics/my-comic/</code> (images for one-shot)<br>
         <code>comics/my-series/Chapter 1/</code> (chapters)
      </p>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(comic => {
    const href = comic.type === 'series'
      ? `/series/${encodeURIComponent(comic.name)}`
      : `/read/${encodeURIComponent(comic.name)}`;
    const meta = comic.type === 'series'
      ? `${comic.chapters} chapter${comic.chapters !== 1 ? 's' : ''}`
      : `${comic.pages} page${comic.pages !== 1 ? 's' : ''}`;
    const badge = comic.type === 'series' ? 'Series' : 'One-shot';
    const coverHtml = comic.cover
      ? `<img src="${comic.cover}" alt="${comic.name}" loading="lazy"/>`
      : `<div class="no-cover">📖</div>`;

    return `
      <a class="card" href="${href}" data-type="${comic.type}">
        <div class="card-img">
          ${coverHtml}
          <span class="card-badge">${badge}</span>
        </div>
        <div class="card-body">
          <div class="card-title">${comic.name}</div>
          <div class="card-meta">${meta}</div>
        </div>
      </a>`;
  }).join('');
}

document.querySelectorAll('.chip').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

loadLibrary();
</script>
</body>
</html>
